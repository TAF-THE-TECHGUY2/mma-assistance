# Nginx site for Meridian Medical Assistance (single EC2, single domain).
# Serves the built React SPA and proxies /api to the Laravel app (PHP-FPM).
#
# Install:
#   sudo cp deploy/nginx-mma.conf /etc/nginx/sites-available/mma
#   sudo ln -s /etc/nginx/sites-available/mma /etc/nginx/sites-enabled/mma
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# The frontend build (frontend/dist/*) is copied into backend/public so that
# Laravel's front controller (index.php) and the SPA shell (index.html) share
# one web root. See docs/DEPLOY-EC2.md.

server {
    listen 80;
    listen [::]:80;

    # "_" is a catch-all that responds on the instance's public IP (no domain
    # needed). When you get a domain, change this to it and run certbot for HTTPS.
    server_name _;

    root /var/www/mma/backend/public;
    index index.html index.php;

    # Allow document uploads up to 25 MB (tune as needed).
    client_max_body_size 25M;

    # API + Laravel front controller.
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Everything else is the React single-page app.
    location / {
        try_files $uri /index.html;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Match this socket to your installed PHP version (e.g. php8.4-fpm.sock).
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    # Long cache for hashed SPA assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles (except ACME challenge for certbot).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
